
[window]
opacity = 1.0
startup_mode = "Windowed"
decorations = "Full"
dynamic_title = true

[font]
size = 11.0
[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[cursor]
style = "Block"

[bell]
command = "none"
[scrolling]
multiplier = 5

[keyboard]
bindings = [
    # Ctrl+Left / Ctrl+Right (перемещение по словам)
    { key = "Left",  mods = "Control", chars = "\u001bb" },
    { key = "Right", mods = "Control", chars = "\u001bf" },
    # Ctrl+Backspace (удалить слово)
    { key = "Back", mods = "Control", chars = "\u0015" },
    # Ctrl+Shift+V / Shift+Insert (вставить из буфера)
    { key = "V", mods = "Control|Shift", action = "Paste" },
    { key = "Insert", mods = "Shift", action = "Paste" },
]

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# === Wayland (встроенная поддержка, явно указывать не нужно) ===

# === Цветовая схема Everforest ===
[colors.primary]
background = "#2b3339"
foreground = "#d3c6aa"

[colors.normal]
black   = "#2b3339"
red     = "#e67e80"
green   = "#a7c080"
yellow  = "#dbbc7f"
blue    = "#7fbbb3"
magenta = "#d699b6"
cyan    = "#83c092"
white   = "#d3c6aa"

[colors.bright]
black   = "#3a4248"
red     = "#f85552"
green   = "#8da101"
yellow  = "#dfa000"
blue    = "#3a94c5"
magenta = "#df69ba"
cyan    = "#35a77c"
white   = "#e5dfc5"
